<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TrendingVerse CMS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#020617;color:#fff;padding:20px}
.card{border:1px solid #1e293b;padding:20px;border-radius:10px;margin-bottom:20px}
input,textarea{width:100%;margin-top:10px;padding:10px;background:#020617;border:1px solid #1e293b;color:#fff}
button{margin-top:10px;padding:10px;background:#38bdf8;border:none}
</style>
</head>

<body>

<h2>TrendingVerse CMS</h2>

<div class="card" id="login">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card" id="dashboard" style="display:none">
<h3>Dashboard</h3>

<input id="topic" placeholder="Enter topic">
<button onclick="generate()">Generate Article</button>

<textarea id="content" rows="10"></textarea>

<button onclick="publish()">Publish</button>
</div>

<script>
const SUPABASE_URL = "https://xnsodbqqvjojlzynhvce.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhuc29kYnFxdmpvamx6eW5odmNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDk5MDIsImV4cCI6MjA5MzAyNTkwMn0.I9BVAH2w-gixGu-4l0HG9mmR6cDuFxbyd3Z0s1ptX9I";
const API = "/api";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;

async function login(){
  const {data,error} = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error) return alert("Login failed");

  user = data.user;
  login.style.display="none";
  dashboard.style.display="block";
}

async function generate(){
  const res = await fetch(`${API}/generate`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({topic: topic.value})
  });

  const data = await res.json();
  content.value = data.article;
}

async function publish(){
  await supabase.from('articles').insert([{
    user_id: user.id,
    title: topic.value,
    content: content.value,
    status: "draft"
  }]);

  alert("Saved!");
}
</script>

</body>
</html>
