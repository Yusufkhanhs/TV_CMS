<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TrendingVerse CMS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: #fff;
  padding: 20px;
}
.card {
  border: 1px solid #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}
input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #020617;
  border: 1px solid #1e293b;
  color: #fff;
}
button {
  margin-top: 10px;
  padding: 10px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
}
h2 { margin-bottom: 20px; }
</style>
</head>

<body>

<h2>🚀 TrendingVerse CMS</h2>

<!-- LOGIN / SIGNUP -->
<div class="card" id="authBox">
  <h3>Login / Signup</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard" style="display:none">
  <h3>Dashboard</h3>

  <button onclick="logout()">Logout</button>

  <input id="topic" placeholder="Enter topic">

  <button onclick="generate()">Generate Article</button>

  <textarea id="content" rows="10" placeholder="Generated article will appear here"></textarea>

  <button onclick="saveArticle()">Save Article</button>
</div>

<script>
const SUPABASE_URL = "https://xnsodbqqvjojlzynhvce.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhuc29kYnFxdmpvamx6eW5odmNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDk5MDIsImV4cCI6MjA5MzAyNTkwMn0.I9BVAH2w-gixGu-4l0HG9mmR6cDuFxbyd3Z0s1ptX9I";

const API = "/api";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;

/* ================= AUTH ================= */

async function signup(){
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });

  if(error){
    alert(error.message);
  } else {
    alert("Signup successful. Please login.");
  }
}

async function login(){
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){
    alert(error.message);
    return;
  }

  user = data.user;
  showDashboard();
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* ================= SESSION ================= */

async function checkSession(){
  const { data } = await supabase.auth.getSession();

  if(data.session){
    user = data.session.user;
    showDashboard();
  }
}

function showDashboard(){
  document.getElementById("authBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

/* ================= CMS ================= */

async function generate(){

  if(!user){
    alert("Login required");
    return;
  }

  if(!topic.value){
    alert("Enter topic");
    return;
  }

  try{
    const res = await fetch(`${API}/generate`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ topic: topic.value })
    });

    const data = await res.json();

    content.value = data.article;

  }catch(e){
    alert("Error generating article");
    console.error(e);
  }
}

async function saveArticle(){

  if(!user){
    alert("Login required");
    return;
  }

  if(!content.value){
    alert("No content to save");
    return;
  }

  const { error } = await supabase.from('articles').insert([{
    user_id: user.id,
    title: topic.value,
    content: content.value,
    status: "draft"
  }]);

  if(error){
    alert("Error saving article");
    console.error(error);
  } else {
    alert("Article saved successfully!");
  }
}

/* ================= INIT ================= */

checkSession();

</script>

</body>
</html>
