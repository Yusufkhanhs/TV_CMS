<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TrendingVerse CMS</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: #fff;
  padding: 20px;
}
.card {
  border: 1px solid #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}
input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #020617;
  border: 1px solid #1e293b;
  color: #fff;
}
button {
  margin-top: 10px;
  padding: 10px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🚀 TrendingVerse CMS</h2>

<div class="card" id="authBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="signupBtn">Sign Up</button>
  <button id="loginBtn">Login</button>
</div>

<div class="card" id="dashboard" style="display:none">
  <h3>Dashboard</h3>

  <button id="logoutBtn">Logout</button>

  <input id="topic" placeholder="Enter topic">
  <button id="generateBtn">Generate Article</button>

  <textarea id="content" rows="10"></textarea>

  <button id="saveBtn">Save Article</button>
</div>

<script>
const SUPABASE_URL = "https://xnsodbqqvjojlzynhvce.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhuc29kYnFxdmpvamx6eW5odmNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDk5MDIsImV4cCI6MjA5MzAyNTkwMn0.I9BVAH2w-gixGu-4l0HG9mmR6cDuFxbyd3Z0s1ptX9I";

if (!window.supabaseClient) {
  window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}
const supabase = window.supabaseClient;

let user = null;

/* ========= AUTH ========= */

async function signup(){
  const { error } = await supabase.auth.signUp({
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  if(error){
    alert(error.message);
  } else {
    alert("Signup successful. Now login.");
  }
}

async function login(){
  const { data, error } = await supabase.auth.signInWithPassword({
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  if(error){
    alert(error.message);
    return;
  }

  user = data.user;
  showDashboard();
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* ========= SESSION ========= */

async function checkSession(){
  const { data } = await supabase.auth.getSession();

  if(data.session){
    user = data.session.user;
    showDashboard();
  }
}

function showDashboard(){
  document.getElementById("authBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

/* ========= CMS ========= */

async function generate(){

  if(!user){
    alert("Login required");
    return;
  }

  const topic = document.getElementById("topic").value;

  if(!topic){
    alert("Enter topic");
    return;
  }

  const article = `
  <h1>${topic}</h1>
  <p>This is a demo article about ${topic}.</p>
  `;

  document.getElementById("content").value = article;
}

async function saveArticle(){

  if(!user){
    alert("Login required");
    return;
  }

  const title = document.getElementById("topic").value;
  const content = document.getElementById("content").value;

  const { error } = await supabase.from('articles').insert([{
    user_id: user.id,
    title,
    content,
    status: "draft"
  }]);

  if(error){
    alert("Error saving article");
    console.error(error);
  } else {
    alert("Saved successfully");
  }
}

/* ========= BUTTON BINDING ========= */

document.getElementById("signupBtn").onclick = signup;
document.getElementById("loginBtn").onclick = login;
document.getElementById("logoutBtn").onclick = logout;
document.getElementById("generateBtn").onclick = generate;
document.getElementById("saveBtn").onclick = saveArticle;

/* ========= INIT ========= */

checkSession();

</script>

</body>
</html>
